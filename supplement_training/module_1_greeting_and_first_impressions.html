<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clark Hyundai Sales Academy - Module 1</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .flip-card {
            perspective: 1000px;
        }
        .flip-card-inner {
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }
        .flip-card-front, .flip-card-back {
            backface-visibility: hidden;
        }
        .flip-card-back {
            transform: rotateY(180deg);
        }
        .flipped {
            transform: rotateY(180deg);
        }
        /* Custom Hyundai-ish Blue */
        .bg-hyundai {
            background-color: #002c5f;
        }
        .text-hyundai {
            color: #002c5f;
        }
        /* Fade In Animation */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICON DEFINITIONS ---
        
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg 
                xmlns="http://www.w3.org/2000/svg" 
                width={size} 
                height={size} 
                viewBox="0 0 24 24" 
                fill="none" 
                stroke="currentColor" 
                strokeWidth="2" 
                strokeLinecap="round" 
                strokeLinejoin="round" 
                className={className}
            >
                {children}
            </svg>
        );

        const Car = (props) => (
            <Icon {...props}>
                <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9C18.7 10.6 16 10 16 10s-1.3-1.4-2.2-2.3c-.5-.4-1.1-.7-1.8-.7H5c-.6 0-1.1.4-1.4.9l-1.4 2.9A3.7 3.7 0 0 0 2 12v4c0 .6.4 1 1 1h2" />
                <circle cx="7" cy="17" r="2" />
                <circle cx="17" cy="17" r="2" />
            </Icon>
        );

        const BookOpen = (props) => (
            <Icon {...props}>
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/>
            </Icon>
        );

        const Users = (props) => (
            <Icon {...props}>
                <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </Icon>
        );

        const MessageSquare = (props) => (
            <Icon {...props}>
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </Icon>
        );

        const CheckCircle = (props) => (
            <Icon {...props}>
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                <polyline points="22 4 12 14.01 9 11.01"/>
            </Icon>
        );

        const XCircle = (props) => (
            <Icon {...props}>
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </Icon>
        );

        const ArrowRight = (props) => (
            <Icon {...props}>
                <line x1="5" y1="12" x2="19" y2="12"/>
                <polyline points="12 5 19 12 12 19"/>
            </Icon>
        );

        const Brain = (props) => (
            <Icon {...props}>
                <path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96.44 2.5 2.5 0 0 1-2.96-3.08 3 3 0 0 1-.34-5.58 2.5 2.5 0 0 1 1.32-4.24 2.5 2.5 0 0 1 1.98-3A2.5 2.5 0 0 1 9.5 2Z"/>
                <path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 14.5 2Z"/>
            </Icon>
        );

        const UserCheck = (props) => (
            <Icon {...props}>
                <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="8.5" cy="7" r="4"/>
                <polyline points="17 11 19 13 23 9"/>
            </Icon>
        );

        const Shield = (props) => (
            <Icon {...props}>
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </Icon>
        );

        const Thermometer = (props) => (
            <Icon {...props}>
                <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z"/>
            </Icon>
        );

        const Coffee = (props) => (
            <Icon {...props}>
                <path d="M18 8h1a4 4 0 0 1 0 8h-1"/>
                <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/>
                <line x1="6" y1="1" x2="6" y2="4"/>
                <line x1="10" y1="1" x2="10" y2="4"/>
                <line x1="14" y1="1" x2="14" y2="4"/>
            </Icon>
        );

        const Eye = (props) => (
            <Icon {...props}>
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </Icon>
        );

        const Smile = (props) => (
            <Icon {...props}>
                <circle cx="12" cy="12" r="10"/>
                <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                <line x1="9" y1="9" x2="9.01" y2="9"/>
                <line x1="15" y1="9" x2="15.01" y2="9"/>
            </Icon>
        );
        
        const AlertCircle = (props) => (
            <Icon {...props}>
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </Icon>
        );

        const Smartphone = (props) => (
            <Icon {...props}>
                <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                <line x1="12" y1="18" x2="12.01" y2="18" />
            </Icon>
        );

        const MapIcon = (props) => (
            <Icon {...props}>
                <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6" />
                <line x1="8" y1="2" x2="8" y2="18" />
                <line x1="16" y1="6" x2="16" y2="22" />
            </Icon>
        );

        // --- DATA ---

        const scienceData = [
            {
                title: "Thin-Slicing",
                icon: <Eye size={32} />,
                concept: "Customers make judgments in seconds.",
                application: "Every detail counts immediately: attire, tone, and eye contact. You don't get a second chance at a first impression."
            },
            {
                title: "Halo Effect",
                icon: <UserCheck size={32} />,
                concept: "A positive first interaction colors the entire perception.",
                application: "A warm greeting makes the customer trust the Service Dept later on. Your hello sets the tone for financing."
            },
            {
                title: "Primacy Effect",
                icon: <Brain size={32} />,
                concept: "Information presented first is remembered best.",
                application: "Your greeting anchors their memory of the entire buying experience. Make the anchor positive."
            },
            {
                title: "Expectation Confirmation",
                icon: <CheckCircle size={32} />,
                concept: "Satisfaction comes from reality meeting expectations.",
                application: "Customers expect sales pressure. When you greet with warmth and space, you break that expectation and build trust."
            },
            {
                title: "Reciprocity",
                icon: <Users size={32} />,
                concept: "People feel obligated to return effort.",
                application: "If you walk out to them (effort), they feel the subconscious need to be polite (return the favor)."
            }
        ];

        const scenarios = [
            {
                id: 1,
                type: "Walk-In",
                icon: <Users />,
                description: "A customer walks through the main door, looking around tentatively.",
                correctAnswer: 1,
                options: [
                    { id: 0, text: "Welcome to Clark Hyundai! Are you here to buy a car today?", feedback: "Too aggressive. This triggers 'Sales Resistance'." },
                    { id: 1, text: "Hi! Thanks for coming in. What brings you to Clark Hyundai? Are you looking for something specific, or just browsing?", feedback: "Perfect! Giving them the 'Just browsing' option lowers anxiety by handing them control." },
                    { id: 2, text: "Let me know if you need help.", feedback: "Too passive. You missed the chance to build rapport." }
                ]
            },
            {
                id: 2,
                type: "The Browser",
                icon: <Eye />,
                description: "A customer is wandering the lot, looking at stickers, avoiding eye contact.",
                correctAnswer: 0,
                options: [
                    { id: 0, text: "Good afternoon! ... Feel free to look around, and if you need any pricing or info, I’m right here.", feedback: "Excellent. This uses Reactance Theory. You validated their desire for space." },
                    { id: 1, text: "That model gets great gas mileage! Want the keys?", feedback: "Too soon. They are still in the 'avoidance' phase." },
                    { id: 2, text: "Can I get your name and number before you look?", feedback: "Major foul! This creates high pressure immediately." }
                ]
            },
            {
                id: 3,
                type: "Weather-Adapted",
                icon: <Thermometer />,
                description: "It is freezing cold and raining. A couple just parked and is walking toward the lot.",
                correctAnswer: 2,
                options: [
                    { id: 0, text: "Stay right there, let me bring a car to you!", feedback: "Good intention, but you haven't established contact yet." },
                    { id: 1, text: "Hi guys! Looking for an SUV?", feedback: "Ignoring their physical discomfort makes you seem unaware." },
                    { id: 2, text: "Welcome in! It’s freezing out there—let’s get you inside where it’s warm. Can I get you a coffee?", feedback: "Maslow's Hierarchy! Address physical comfort first to clear mental bandwidth for selling." }
                ]
            }
        ];

        // --- COMPONENTS ---

        const NavButton = ({ active, onClick, icon, label }) => (
            <button 
                onClick={onClick}
                className={`flex flex-col items-center justify-center p-3 w-full sm:w-auto sm:flex-row sm:space-x-2 rounded-lg transition-all ${
                    active 
                    ? 'bg-hyundai text-white shadow-lg' 
                    : 'bg-white text-gray-600 hover:bg-gray-100'
                }`}
            >
                {icon}
                <span className="text-xs sm:text-sm font-medium mt-1 sm:mt-0">{label}</span>
            </button>
        );

        const SectionHeader = ({ title, subtitle }) => (
            <div className="mb-6 border-l-4 border-[#002c5f] pl-4">
                <h2 className="text-2xl font-bold text-gray-800">{title}</h2>
                <p className="text-gray-600">{subtitle}</p>
            </div>
        );

        // 1. INTRO COMPONENT
        const IntroModule = ({ onStart }) => (
            <div className="flex flex-col items-center justify-center space-y-6 text-center py-10 animate-fade-in">
                <div className="w-24 h-24 bg-blue-100 rounded-full flex items-center justify-center">
                    <Car size={48} className="text-hyundai" />
                </div>
                <div>
                    <h1 className="text-4xl font-bold text-gray-900 mb-2">Module 1: Greeting & First Impressions</h1>
                    <p className="text-xl text-gray-600">Clark Hyundai Sales Academy</p>
                </div>
                <div className="bg-white p-6 rounded-xl shadow-md max-w-2xl border-t-4 border-[#002c5f]">
                    <h3 className="font-bold text-lg mb-2">Motto</h3>
                    <p className="italic text-gray-700 text-lg">
                        "Approach each customer with the idea of helping them solve a problem or achieve a goal, not of selling a product or service."
                        <br/>
                        <span className="text-sm font-semibold not-italic text-gray-500 block mt-2">— Brian Tracy</span>
                    </p>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-4 text-left w-full max-w-3xl">
                    <div className="bg-white p-4 rounded-lg shadow-sm">
                        <h4 className="font-bold text-hyundai flex items-center gap-2"><Brain size={18}/> The Objective</h4>
                        <p className="text-sm text-gray-600 mt-1">Establish a positive first impression to build rapport immediately.</p>
                    </div>
                    <div className="bg-white p-4 rounded-lg shadow-sm">
                        <h4 className="font-bold text-hyundai flex items-center gap-2"><Shield size={18}/> The Challenge</h4>
                        <p className="text-sm text-gray-600 mt-1">Overcome the "Sales Vulture" stigma and create a "Valet" experience.</p>
                    </div>
                </div>
                <button 
                    onClick={onStart}
                    className="bg-hyundai text-white px-8 py-3 rounded-full font-bold text-lg shadow-lg hover:bg-blue-900 transition flex items-center gap-2"
                >
                    Start Training <ArrowRight size={20} />
                </button>
            </div>
        );

        // 2. SCIENCE COMPONENT
        const ScienceModule = () => {
            const [flippedIndex, setFlippedIndex] = useState(null);

            return (
                <div className="animate-fade-in">
                    <SectionHeader title="1.0 The Science" subtitle="Why it matters: Leveraging psychology to create connections." />
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                        {scienceData.map((item, index) => (
                            <div 
                                key={index} 
                                className="h-64 cursor-pointer flip-card"
                                onClick={() => setFlippedIndex(flippedIndex === index ? null : index)}
                            >
                                <div className={`relative w-full h-full flip-card-inner bg-white rounded-xl shadow-md ${flippedIndex === index ? 'flipped' : ''}`}>
                                    {/* Front */}
                                    <div className="absolute w-full h-full flip-card-front flex flex-col items-center justify-center p-6 bg-white rounded-xl border border-gray-200">
                                        <div className="bg-blue-50 p-4 rounded-full mb-4 text-hyundai">
                                            {item.icon}
                                        </div>
                                        <h3 className="text-xl font-bold text-center text-gray-800">{item.title}</h3>
                                        <p className="text-sm text-gray-500 mt-2 text-center">Tap to reveal</p>
                                    </div>

                                    {/* Back */}
                                    <div className="absolute w-full h-full flip-card-back bg-hyundai text-white rounded-xl p-6 flex flex-col justify-center text-center">
                                        <h4 className="font-bold text-lg mb-2">{item.concept}</h4>
                                        <div className="w-8 h-1 bg-blue-300 mx-auto mb-3"></div>
                                        <p className="text-sm text-blue-100">{item.application}</p>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // 3. BODY LANGUAGE COMPONENT
        const BodyLanguageModule = () => {
            const [checklist, setChecklist] = useState({
                timing: false,
                eye: false,
                smile: false,
                posture: false,
                hands: false
            });

            const toggle = (key) => setChecklist(prev => ({...prev, [key]: !prev[key]}));
            const allChecked = Object.values(checklist).every(Boolean);

            return (
                <div className="animate-fade-in">
                    <SectionHeader title="1.1 Non-Verbal Cues" subtitle="The first 10 seconds define the relationship." />

                    <div className="flex flex-col lg:flex-row gap-8">
                        <div className="flex-1">
                            <div className="bg-white p-6 rounded-xl shadow-md">
                                <h3 className="font-bold text-lg mb-4">The Professional Checklist</h3>
                                <p className="mb-4 text-sm text-gray-600">Click each item to master the non-verbal cues.</p>
                                
                                <div className="space-y-3">
                                    <button onClick={() => toggle('timing')} className={`w-full text-left p-4 rounded-lg flex items-center justify-between transition ${checklist.timing ? 'bg-green-50 border border-green-200' : 'bg-gray-50 border border-gray-200 hover:bg-gray-100'}`}>
                                        <span className="font-semibold flex items-center gap-2"><ClockIcon active={checklist.timing} /> Timing</span>
                                        {checklist.timing && <span className="text-xs text-green-700 font-bold">10 Seconds Rule</span>}
                                    </button>
                                    
                                    <button onClick={() => toggle('eye')} className={`w-full text-left p-4 rounded-lg flex items-center justify-between transition ${checklist.eye ? 'bg-green-50 border border-green-200' : 'bg-gray-50 border border-gray-200 hover:bg-gray-100'}`}>
                                        <span className="font-semibold flex items-center gap-2"><EyeIcon active={checklist.eye} /> Eye Contact</span>
                                        {checklist.eye && <span className="text-xs text-green-700 font-bold">Confidence, not staring</span>}
                                    </button>

                                    <button onClick={() => toggle('smile')} className={`w-full text-left p-4 rounded-lg flex items-center justify-between transition ${checklist.smile ? 'bg-green-50 border border-green-200' : 'bg-gray-50 border border-gray-200 hover:bg-gray-100'}`}>
                                        <span className="font-semibold flex items-center gap-2"><SmileIcon active={checklist.smile} /> Genuine Smile</span>
                                        {checklist.smile && <span className="text-xs text-green-700 font-bold">Break apprehension</span>}
                                    </button>

                                    <button onClick={() => toggle('posture')} className={`w-full text-left p-4 rounded-lg flex items-center justify-between transition ${checklist.posture ? 'bg-green-50 border border-green-200' : 'bg-gray-50 border border-gray-200 hover:bg-gray-100'}`}>
                                        <span className="font-semibold flex items-center gap-2"><UserIcon active={checklist.posture} /> Posture</span>
                                        {checklist.posture && <span className="text-xs text-green-700 font-bold">Shoulders back, no crossed arms</span>}
                                    </button>

                                    <button onClick={() => toggle('hands')} className={`w-full text-left p-4 rounded-lg flex items-center justify-between transition ${checklist.hands ? 'bg-green-50 border border-green-200' : 'bg-gray-50 border border-gray-200 hover:bg-gray-100'}`}>
                                        <span className="font-semibold flex items-center gap-2"><HandIcon active={checklist.hands} /> Hands</span>
                                        {checklist.hands && <span className="text-xs text-green-700 font-bold">Open palms, never point</span>}
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 flex items-center justify-center">
                            <div className={`transition-all duration-500 ${allChecked ? 'scale-110' : 'scale-100'}`}>
                                {allChecked ? (
                                    <div className="text-center p-8 bg-green-100 rounded-full w-64 h-64 flex flex-col items-center justify-center border-4 border-green-500">
                                        <CheckCircle size={64} className="text-green-600 mb-2" />
                                        <h3 className="text-xl font-bold text-green-800">Ready to Sell!</h3>
                                    </div>
                                ) : (
                                    <div className="text-center p-8 bg-gray-200 rounded-full w-64 h-64 flex flex-col items-center justify-center border-4 border-gray-300">
                                        <Users size={64} className="text-gray-400 mb-2" />
                                        <h3 className="text-xl font-bold text-gray-500">Preparing...</h3>
                                        <p className="text-sm text-gray-400">{Object.values(checklist).filter(Boolean).length}/5 Cues Ready</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };
        
        // Helper Icons for BodyLanguage
        const ClockIcon = ({active}) => active ? <CheckCircle size={18} className="text-green-600"/> : <CheckCircle size={18} className="text-gray-300"/>;
        const EyeIcon = ({active}) => active ? <Eye size={18} className="text-green-600"/> : <Eye size={18} className="text-gray-300"/>;
        const SmileIcon = ({active}) => active ? <Smile size={18} className="text-green-600"/> : <Smile size={18} className="text-gray-300"/>;
        const UserIcon = ({active}) => active ? <UserCheck size={18} className="text-green-600"/> : <UserCheck size={18} className="text-gray-300"/>;
        const HandIcon = ({active}) => active ? <Users size={18} className="text-green-600"/> : <Users size={18} className="text-gray-300"/>;


        // 4. SCENARIOS MODULE
        const ScenariosModule = () => {
            const [currentScenario, setCurrentScenario] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [showFeedback, setShowFeedback] = useState(false);

            const handleSelect = (optionId) => {
                setSelectedOption(optionId);
                setShowFeedback(true);
            };

            const nextScenario = () => {
                setSelectedOption(null);
                setShowFeedback(false);
                if (currentScenario < scenarios.length - 1) {
                    setCurrentScenario(curr => curr + 1);
                }
            };

            const scenario = scenarios[currentScenario];

            return (
                <div className="animate-fade-in">
                    <SectionHeader title="1.2 Greeting Scenarios" subtitle="Choose the best psychological approach for each situation." />

                    <div className="bg-white rounded-xl shadow-lg overflow-hidden border border-gray-200">
                        {/* Scenario Header */}
                        <div className="bg-gray-50 p-6 border-b border-gray-200 flex items-start gap-4">
                            <div className="p-3 bg-blue-100 rounded-full text-hyundai">
                                {scenario.icon}
                            </div>
                            <div>
                                <div className="text-sm font-bold text-gray-500 uppercase tracking-wide">Scenario {currentScenario + 1} of {scenarios.length}</div>
                                <h3 className="text-2xl font-bold text-gray-800">{scenario.type}</h3>
                                <p className="text-gray-600 mt-2">{scenario.description}</p>
                            </div>
                        </div>

                        {/* Options */}
                        <div className="p-6 space-y-4">
                            {scenario.options.map((option) => (
                                <button
                                    key={option.id}
                                    onClick={() => !showFeedback && handleSelect(option.id)}
                                    disabled={showFeedback}
                                    className={`w-full text-left p-4 rounded-lg border-2 transition-all ${
                                        showFeedback 
                                            ? option.id === scenario.correctAnswer 
                                                ? 'border-green-500 bg-green-50' 
                                                : option.id === selectedOption 
                                                    ? 'border-red-500 bg-red-50'
                                                    : 'border-gray-200 opacity-50'
                                            : 'border-gray-200 hover:border-blue-500 hover:bg-blue-50'
                                    }`}
                                >
                                    <div className="font-medium text-lg text-gray-800">"{option.text}"</div>
                                    {showFeedback && (option.id === selectedOption || option.id === scenario.correctAnswer) && (
                                        <div className={`mt-2 text-sm font-semibold ${option.id === scenario.correctAnswer ? 'text-green-700' : 'text-red-700'}`}>
                                            {option.feedback}
                                        </div>
                                    )}
                                </button>
                            ))}
                        </div>

                        {/* Footer Controls */}
                        {showFeedback && (
                            <div className="p-6 bg-gray-50 border-t border-gray-200 flex justify-end">
                                {currentScenario < scenarios.length - 1 ? (
                                    <button onClick={nextScenario} className="bg-hyundai text-white px-6 py-2 rounded-lg font-bold hover:bg-blue-900 transition flex items-center gap-2">
                                        Next Scenario <ArrowRight size={18} />
                                    </button>
                                ) : (
                                    <div className="text-green-600 font-bold flex items-center gap-2">
                                        <CheckCircle /> Scenarios Complete!
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 5. DRIVE UP MODULE (Special)
        const DriveUpModule = () => {
            const [step, setStep] = useState(1); // 1: Mindset, 2: Position, 3: Window

            return (
                <div className="animate-fade-in">
                    <SectionHeader title="1.3 The 'Drive-Up' Masterclass" subtitle="Transforming from Vulture to Valet." />

                    {/* Step Navigation */}
                    <div className="flex justify-between mb-8 max-w-2xl mx-auto">
                        <button onClick={() => setStep(1)} className={`px-4 py-2 rounded-full font-bold text-sm ${step === 1 ? 'bg-hyundai text-white' : 'bg-white text-gray-500'}`}>1. Mindset</button>
                        <button onClick={() => setStep(2)} className={`px-4 py-2 rounded-full font-bold text-sm ${step === 2 ? 'bg-hyundai text-white' : 'bg-white text-gray-500'}`}>2. Positioning</button>
                        <button onClick={() => setStep(3)} className={`px-4 py-2 rounded-full font-bold text-sm ${step === 3 ? 'bg-hyundai text-white' : 'bg-white text-gray-500'}`}>3. The Interaction</button>
                    </div>

                    <div className="bg-white rounded-xl shadow-lg p-6 min-h-[400px]">
                        
                        {/* STEP 1: MINDSET */}
                        {step === 1 && (
                            <div className="animate-fade-in">
                                <h3 className="text-xl font-bold mb-4 text-center">The Vulture vs. The Valet</h3>
                                <div className="flex flex-col md:flex-row gap-4">
                                    <div className="flex-1 border-2 border-red-100 bg-red-50 p-4 rounded-xl">
                                        <div className="flex items-center gap-2 mb-2 text-red-800 font-bold"><XCircle size={20}/> The Vulture</div>
                                        <ul className="list-disc pl-5 text-sm text-red-700 space-y-2">
                                            <li>Circles and waits.</li>
                                            <li>Sprints to the door (Desperate).</li>
                                            <li>Goal: Take a sale.</li>
                                        </ul>
                                    </div>
                                    <div className="flex-1 border-2 border-green-100 bg-green-50 p-4 rounded-xl">
                                        <div className="flex items-center gap-2 mb-2 text-green-800 font-bold"><CheckCircle size={20}/> The Valet</div>
                                        <ul className="list-disc pl-5 text-sm text-green-700 space-y-2">
                                            <li>Anticipates arrival.</li>
                                            <li>Walks with purpose to a respectful distance.</li>
                                            <li>Goal: Give help/direction.</li>
                                        </ul>
                                    </div>
                                </div>
                                <div className="mt-8 text-center">
                                    <p className="italic text-gray-500 mb-4">"If you sprint, you are a vulture. If you walk with purpose, you are a professional."</p>
                                    <button onClick={() => setStep(2)} className="text-hyundai font-bold hover:underline">Next: Where to stand &rarr;</button>
                                </div>
                            </div>
                        )}

                        {/* STEP 2: POSITIONING (VISUAL) */}
                        {step === 2 && (
                            <div className="animate-fade-in flex flex-col items-center">
                                <h3 className="text-xl font-bold mb-2">The "Safe Zone" Approach</h3>
                                <p className="text-gray-600 text-sm mb-6 text-center max-w-md">Target the <span className="font-bold text-green-700">Front Driver-Side Quarter Panel</span>. The rear is a blind spot!</p>
                                
                                <div className="relative w-64 h-96 bg-gray-100 rounded-lg border-2 border-dashed border-gray-300 flex items-center justify-center mb-4">
                                    {/* Car Graphic (Abstract) */}
                                    <div className="w-32 h-64 bg-gray-800 rounded-2xl relative shadow-xl">
                                        <div className="absolute top-4 left-4 right-4 h-12 bg-blue-900 rounded-lg opacity-50"></div> {/* Windshield */}
                                        <div className="absolute top-1/2 left-0 w-2 h-16 bg-gray-600 rounded-r"></div> {/* Door handle area */}
                                        <div className="text-white text-xs absolute inset-0 flex items-center justify-center opacity-30 font-bold rotate-90">Customer Vehicle</div>
                                    </div>

                                    {/* Bad Zone (Rear) */}
                                    <div className="absolute bottom-12 left-8 w-12 h-12 rounded-full border-4 border-red-500 opacity-30 animate-pulse flex items-center justify-center">
                                        <XCircle className="text-red-500" size={16}/>
                                        <span className="absolute -bottom-6 text-xs text-red-700 font-bold whitespace-nowrap">Blind Spot!</span>
                                    </div>

                                    {/* Safe Zone (Front Left) */}
                                    <div className="absolute top-20 left-6 w-12 h-12 rounded-full border-4 border-green-500 bg-green-100 flex items-center justify-center shadow-lg z-10">
                                        <div className="w-3 h-3 bg-green-600 rounded-full"></div>
                                    </div>
                                    
                                    {/* Arrow */}
                                    <div className="absolute top-32 left-8 text-xs text-green-700 font-bold">Safe Zone</div>
                                </div>
                                <button onClick={() => setStep(3)} className="text-hyundai font-bold hover:underline">Next: Breaking the Ice &rarr;</button>
                            </div>
                        )}

                        {/* STEP 3: INTERACTION */}
                        {step === 3 && (
                            <div className="animate-fade-in">
                                <h3 className="text-xl font-bold mb-4 text-center">The "Window Roll-Down"</h3>
                                <p className="text-center text-gray-600 mb-6">When the window comes down, the customer feels vulnerable. Use these tactics:</p>
                                
                                <div className="space-y-4">
                                    <div className="bg-gray-50 p-4 rounded-lg border-l-4 border-blue-500">
                                        <h4 className="font-bold">1. The "Leveler" (Eye Contact)</h4>
                                        <p className="text-sm text-gray-600">Action: Lower your position (squat or bend slightly) to match their eye level.</p>
                                        <p className="text-xs text-blue-600 font-semibold mt-1">Why: Standing over them creates dominance/threat. Being level builds trust.</p>
                                    </div>
                                    <div className="bg-gray-50 p-4 rounded-lg border-l-4 border-blue-500">
                                        <h4 className="font-bold">2. The "Invite to Park"</h4>
                                        <p className="text-sm text-gray-600">Script: "Welcome in! Feel free to park right here and stretch your legs."</p>
                                        <p className="text-xs text-blue-600 font-semibold mt-1">Why: Validates their arrival and gives them a clear, low-pressure next step.</p>
                                    </div>
                                    <div className="bg-gray-50 p-4 rounded-lg border-l-4 border-blue-500">
                                        <h4 className="font-bold">3. The "Step Back"</h4>
                                        <p className="text-sm text-gray-600">Action: Take one visible step back as they open the door.</p>
                                        <p className="text-xs text-blue-600 font-semibold mt-1">Why: Signals "I won't reach in. You are safe."</p>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        // 6. WINDOW CRACK MODULE (New 1.4)
        const WindowCrackModule = () => {
            const [activeStep, setActiveStep] = useState(0);

            const steps = [
                {
                    title: "The Trap & The Psychology",
                    content: (
                        <div className="space-y-4">
                            <div className="bg-red-50 p-4 rounded-lg border-l-4 border-red-500">
                                <h4 className="font-bold text-red-800 flex items-center gap-2"><AlertCircle size={18}/> The Trap</h4>
                                <p className="text-sm text-red-700">Customer asks: "Do you have any RAV4 Primes?" <br/> Rookie Mistake: Panicking, looking at phone, saying "No". <br/> Result: Customer drives away.</p>
                            </div>
                            <div className="bg-blue-50 p-4 rounded-lg border-l-4 border-blue-500">
                                <h4 className="font-bold text-blue-800 flex items-center gap-2"><Shield size={18}/> The Anonymity Shield</h4>
                                <p className="text-sm text-blue-700">The customer is using the car door as a shield (Low-Commitment Inquiry). Do not pull them out immediately. Provide value to make them stay.</p>
                            </div>
                        </div>
                    )
                },
                {
                    title: "Step 1: Validate & Pivot",
                    content: (
                        <div className="bg-white p-6 rounded-lg shadow border border-gray-200">
                            <h4 className="font-bold text-lg mb-2">The "Lay of the Land"</h4>
                            <p className="italic text-gray-600 mb-4">"Great question, those are hot vehicles! Let me give you the lay of the land real quick so you know where to look..."</p>
                            <p className="text-sm text-green-600 font-semibold">Goal: Don't answer "No". Keep the conversation alive.</p>
                        </div>
                    )
                },
                {
                    title: "Step 2: The Inventory Map",
                    content: (
                        <div className="bg-white p-6 rounded-lg shadow border border-gray-200">
                            <h4 className="font-bold text-lg mb-2">Build Authority</h4>
                            <p className="italic text-gray-600 mb-4">"We have our used cars out front, Certified Pre-Owned along the side, and new inventory closer to the showroom. Honestly, we’re never really ‘out’—it just might be in transit."</p>
                            <div className="bg-gray-100 p-3 rounded text-sm">
                                <span className="font-bold">Key Tactic:</span> Sell the "possibility" of the car, not just the current list.
                            </div>
                        </div>
                    )
                },
                {
                    title: "Step 3: The Engagement Hook",
                    content: (
                        <div className="bg-white p-6 rounded-lg shadow border border-gray-200">
                            <h4 className="font-bold text-lg mb-2">Transition to Trade</h4>
                            <p className="italic text-gray-600 mb-4">"While I check what’s coming in on the truck for you—are you driving a Santa Fe right now?" <br/><br/> "Oh nice! Would you be selling that to us if we can find the right Hybrid for you?"</p>
                        </div>
                    )
                },
                {
                    title: "Step 4: The Park",
                    content: (
                        <div className="bg-white p-6 rounded-lg shadow border border-gray-200">
                            <h4 className="font-bold text-lg mb-2">The Invitation</h4>
                            <p className="italic text-gray-600 mb-4">"Do you mind if we take a quick look at it? It might save you some time later. You can pull right in here."</p>
                            <div className="flex items-center gap-2 text-green-700 font-bold bg-green-50 p-2 rounded">
                                <CheckCircle size={18}/> Success: You turned a drive-by into a parked customer.
                            </div>
                        </div>
                    )
                }
            ];

            return (
                <div className="animate-fade-in">
                    <SectionHeader title="1.4 The 'Window Crack' Greeting" subtitle="Breaking the Anonymity Shield and pivoting to a conversation." />
                    
                    {/* Manager Coaching Banner */}
                    <div className="mb-6 bg-yellow-50 border border-yellow-200 p-4 rounded-xl flex items-start gap-3">
                        <div className="bg-yellow-100 p-2 rounded-full text-yellow-700 mt-1">
                            <Smartphone size={24} />
                        </div>
                        <div>
                            <h4 className="font-bold text-yellow-900 uppercase text-xs tracking-wider mb-1">Manager Coaching: The "No Phones" Rule</h4>
                            <p className="text-sm text-yellow-800">
                                <span className="font-bold">The Mistake:</span> Checking the app immediately. It breaks eye contact and leads to a "No".
                                <br/>
                                <span className="font-bold">The Fix:</span> YOU are the inventory system. Put the phone away. Sell the layout and the incoming trucks.
                            </p>
                        </div>
                    </div>

                    {/* Stepper */}
                    <div className="flex flex-col md:flex-row gap-6">
                        <div className="md:w-1/3 space-y-2">
                            {steps.map((s, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => setActiveStep(idx)}
                                    className={`w-full text-left p-3 rounded-lg text-sm font-semibold transition-all ${activeStep === idx ? 'bg-hyundai text-white shadow-md' : 'bg-white text-gray-600 hover:bg-gray-50'}`}
                                >
                                    {s.title}
                                </button>
                            ))}
                        </div>
                        <div className="md:w-2/3">
                            {steps[activeStep].content}
                        </div>
                    </div>
                </div>
            );
        };

        // 7. WALK-IN MASTERCLASS (New 1.5)
        const WalkInModule = () => {
            const [triageChoice, setTriageChoice] = useState(null);

            const renderTriageResponse = () => {
                if (!triageChoice) return null;
                
                let content = {};
                switch(triageChoice) {
                    case 'service':
                        content = {
                            title: "Scenario A: Service/Parts",
                            action: "Do not point. Escort.",
                            script: "Great! Let me take you right over there and make sure you get taken care of."
                        };
                        break;
                    case 'salesperson':
                        content = {
                            title: "Scenario B: Specific Salesperson",
                            action: "Validate and offer comfort.",
                            script: "Excellent. Follow me, I'll grab them for you. By the way, would you like something cold or hot to drink while I get them?"
                        };
                        break;
                    case 'browsing':
                        content = {
                            title: "Scenario C: 'Just Looking'",
                            action: "The Permission Grant.",
                            script: "No problem at all. My name is [Name]. I'd be happy to get you any information or pricing whenever you're ready. Take your time."
                        };
                        break;
                }

                return (
                    <div className="mt-4 p-4 bg-blue-50 border-l-4 border-blue-500 rounded-r-lg animate-fade-in">
                        <h4 className="font-bold text-blue-900">{content.title}</h4>
                        <p className="text-xs text-blue-600 font-bold uppercase mb-2">{content.action}</p>
                        <p className="italic text-gray-700">"{content.script}"</p>
                    </div>
                );
            };

            return (
                <div className="animate-fade-in space-y-8">
                    <SectionHeader title="1.5 The Drive-Up & Walk-In Masterclass" subtitle="The Triage Greeting & The Lay of the Land." />

                    {/* Step 1: Universal Greeting */}
                    <div className="bg-white p-6 rounded-xl shadow-md">
                        <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><div className="bg-hyundai text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">1</div> The Universal Greeting</h3>
                        <p className="text-gray-600 mb-4 text-sm">Mandatory for everyone. Stop assuming they are here to buy. Treat them like a hotel guest.</p>
                        <div className="bg-gray-100 p-4 rounded-lg border-l-4 border-gray-400">
                            <p className="italic font-medium text-gray-800">"Good morning! Welcome to Clark Hyundai. I appreciate you stopping in. Are you here for Parts, Sales, or Service?"</p>
                        </div>
                    </div>

                    {/* Step 2: Traffic Control */}
                    <div className="bg-white p-6 rounded-xl shadow-md">
                        <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><div className="bg-hyundai text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">2</div> The 'Traffic Control' Response</h3>
                        <p className="text-gray-600 mb-4 text-sm">Select the customer's response to see the correct tactic:</p>
                        
                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-3">
                            <button onClick={() => setTriageChoice('service')} className={`p-3 rounded-lg border-2 font-bold text-sm ${triageChoice === 'service' ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-gray-300'}`}>"Here for Service"</button>
                            <button onClick={() => setTriageChoice('salesperson')} className={`p-3 rounded-lg border-2 font-bold text-sm ${triageChoice === 'salesperson' ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-gray-300'}`}>"Here to see Bob"</button>
                            <button onClick={() => setTriageChoice('browsing')} className={`p-3 rounded-lg border-2 font-bold text-sm ${triageChoice === 'browsing' ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:border-gray-300'}`}>"Just looking"</button>
                        </div>
                        {renderTriageResponse()}
                    </div>

                    {/* Step 3 & 4: Lay of Land & Transition */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-xl shadow-md">
                            <h3 className="font-bold text-lg mb-4 flex items-center gap-2"><div className="bg-hyundai text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">3</div> Lay of the Land</h3>
                            <div className="space-y-3">
                                <div className="flex items-center gap-2 text-sm text-gray-700"><MapIcon size={16} className="text-blue-600"/> Used Cars: Out Front</div>
                                <div className="flex items-center gap-2 text-sm text-gray-700"><MapIcon size={16} className="text-blue-600"/> Certified Pre-Owned: Along the side</div>
                                <div className="flex items-center gap-2 text-sm text-gray-700"><MapIcon size={16} className="text-blue-600"/> New Inventory: Closest to building</div>
                                <p className="text-xs text-gray-500 mt-2 bg-gray-50 p-2 rounded">"We are never 'out' of anything. It might be in transit or inspection."</p>
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-xl shadow-md border-2 border-green-100">
                            <h3 className="font-bold text-lg mb-4 flex items-center gap-2 text-green-800"><div className="bg-green-600 text-white w-6 h-6 rounded-full flex items-center justify-center text-xs">4</div> The Trade Hook</h3>
                            <p className="text-sm text-gray-600 mb-4">Pivot immediately to their vehicle.</p>
                            <div className="space-y-3 italic text-gray-800 font-medium">
                                <p>"Oh, by the way—are you driving a Santa Fe?"</p>
                                <p className="text-green-700">"Would you be selling that to us if we can find something you like?"</p>
                                <p>"Do you mind if you and I take a quick look at it? It keeps things efficient."</p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- MAIN APP ---

        const App = () => {
            const [activeTab, setActiveTab] = useState('intro');
            const [completed, setCompleted] = useState([]);

            const markComplete = (tab) => {
                if (!completed.includes(tab)) {
                    setCompleted([...completed, tab]);
                }
            };

            useEffect(() => {
                if(activeTab !== 'intro') markComplete(activeTab);
            }, [activeTab]);

            const renderContent = () => {
                switch(activeTab) {
                    case 'intro': return <IntroModule onStart={() => setActiveTab('science')} />;
                    case 'science': return <ScienceModule />;
                    case 'body': return <BodyLanguageModule />;
                    case 'scenarios': return <ScenariosModule />;
                    case 'driveup': return <DriveUpModule />;
                    case 'windowcrack': return <WindowCrackModule />;
                    case 'walkin': return <WalkInModule />;
                    default: return <IntroModule />;
                }
            };

            const progress = (completed.length / 6) * 100; // Increased denominator to 6 modules

            return (
                <div className="min-h-screen bg-gray-100 flex flex-col md:flex-row">
                    
                    {/* Sidebar / Nav */}
                    <div className="bg-white md:w-64 p-4 shadow-lg z-10 flex flex-col justify-between">
                        <div>
                            <div className="flex items-center gap-2 font-bold text-xl text-[#002c5f] mb-8 px-2">
                                <Car /> Clark Hyundai
                            </div>
                            
                            <div className="space-y-2">
                                <NavButton active={activeTab === 'intro'} onClick={() => setActiveTab('intro')} icon={<BookOpen size={20}/>} label="Overview" />
                                <NavButton active={activeTab === 'science'} onClick={() => setActiveTab('science')} icon={<Brain size={20}/>} label="1.0 The Science" />
                                <NavButton active={activeTab === 'body'} onClick={() => setActiveTab('body')} icon={<UserCheck size={20}/>} label="1.1 Non-Verbal" />
                                <NavButton active={activeTab === 'scenarios'} onClick={() => setActiveTab('scenarios')} icon={<MessageSquare size={20}/>} label="1.2 Scenarios" />
                                <NavButton active={activeTab === 'driveup'} onClick={() => setActiveTab('driveup')} icon={<Car size={20}/>} label="1.3 The Drive-Up" />
                                <NavButton active={activeTab === 'windowcrack'} onClick={() => setActiveTab('windowcrack')} icon={<Shield size={20}/>} label="1.4 Window Crack" />
                                <NavButton active={activeTab === 'walkin'} onClick={() => setActiveTab('walkin')} icon={<Users size={20}/>} label="1.5 Walk-In Class" />
                            </div>
                        </div>

                        <div className="mt-8 md:mt-0 bg-gray-50 p-4 rounded-lg">
                            <h4 className="text-xs font-bold text-gray-500 uppercase mb-2">Module Progress</h4>
                            <div className="w-full bg-gray-200 rounded-full h-2.5">
                                <div className="bg-green-500 h-2.5 rounded-full transition-all duration-500" style={{width: `${progress}%`}}></div>
                            </div>
                            <p className="text-xs text-right mt-1 text-gray-500">{Math.round(progress)}% Complete</p>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="flex-1 p-4 md:p-8 overflow-y-auto h-screen">
                        <div className="max-w-4xl mx-auto">
                            {renderContent()}
                        </div>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
